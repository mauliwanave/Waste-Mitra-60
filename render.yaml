services:
  - type: web
    name: waste-mitra
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn waste_management.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --threads 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: GEMINI_API_KEY
        sync: false
